<template>
    <lightning-card title="Meu Saldo de Ferias" icon-name="custom:custom97">
        <div slot="actions">
            <lightning-button label="Agendar" variant="brand" icon-name="utility:event" onclick={handleAgendar}></lightning-button>
        </div>

        <div class="slds-p-horizontal_medium">
            <template if:true={loading}>
                <div class="slds-text-align_center slds-p-vertical_large">
                    <lightning-spinner alternative-text="Carregando" size="small"></lightning-spinner>
                </div>
            </template>

            <template if:true={hasError}>
                <div class="slds-text-color_error slds-p-vertical_medium">
                    Nao foi possivel carregar seu saldo: {error}
                </div>
            </template>

            <template if:true={noSaldo}>
                <div class="slds-text-color_weak slds-p-vertical_medium">
                    Voce ainda nao tem um periodo aquisitivo vigente.
                </div>
            </template>

            <template if:true={hasSaldo}>
                <div class="grid">
                    <div class="progress-wrapper">
                        <div class="progress-ring" style={progressStyle}>
                            <div class="progress-inner">
                                <div class="progress-value">{diasDisponiveis}</div>
                                <div class="progress-label">dias<br/>disponiveis</div>
                            </div>
                        </div>
                    </div>
                    <div class="stats">
                        <div class="stat-row">
                            <span class="stat-label">Regime</span>
                            <span class="stat-value">
                                <lightning-badge label={regime}></lightning-badge>
                            </span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Direito no periodo</span>
                            <span class="stat-value stat-highlight">{diasDireito} dias</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Ja tirados</span>
                            <span class="stat-value">{diasTirados} dias</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Concessivo ate</span>
                            <span class="stat-value">
                                <lightning-formatted-date-time value={concessivoFim} year="numeric" month="short" day="2-digit"></lightning-formatted-date-time>
                            </span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
